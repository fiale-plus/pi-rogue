name: check

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  check:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22.19.0']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Type and validation coverage checks
        run: npm run check
      - name: Run tests
        run: npm test -- --reporter=json --outputFile=vitest-results.json
      - name: Verify packed minimum-runtime durability
        run: npm run test:packed-min-node
      - name: Summary
        if: always()
        run: |
          {
            echo "## CI Summary"
            node <<'NODE'
          const fs = require("node:fs");
          const reportPath = "vitest-results.json";
          if (!fs.existsSync(reportPath)) {
            console.log("- Tests: unavailable (Vitest did not produce a JSON report)");
          } else {
            const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
            console.log(`- Tests: ${report.numPassedTests} passed, ${report.numFailedTests} failed, ${report.numPendingTests} pending`);
          }
          NODE
          } >> "$GITHUB_STEP_SUMMARY"
