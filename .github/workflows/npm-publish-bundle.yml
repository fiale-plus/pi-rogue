name: Publish Pi-Rogue to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'pi-rogue-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Run checks
        run: |
          npm run check
          npm test

      - name: Validate committed version and release-note policy
        run: node scripts/validate-release-policy.mjs

      - name: Vendor bundled package sources for single-artefact release (leaf releases paused)
        working-directory: packages/bundle
        run: |
          mkdir -p node_modules/@fiale-plus
          cp -a ../../packages/core node_modules/@fiale-plus/pi-core
          cp -a ../../packages/advisor node_modules/@fiale-plus/pi-rogue-advisor
          cp -a ../../packages/context-broker node_modules/@fiale-plus/pi-rogue-context-broker
          cp -a ../../packages/orchestration node_modules/@fiale-plus/pi-rogue-orchestration
          cp -a ../../packages/router node_modules/@fiale-plus/pi-rogue-router
          node ../../scripts/prepare-bundle-publish.mjs .
          echo "Vendored local (git-at-tag) core, advisor, context-broker, orchestration, and router into bundle for bundling as single artefact"

      - name: Pack and smoke-test the exact canonical artifact
        id: candidate
        working-directory: packages/bundle
        run: |
          set -euo pipefail
          PACK_DIR="$RUNNER_TEMP/pi-rogue-pack"
          mkdir -p "$PACK_DIR"
          npm pack --json --pack-destination "$PACK_DIR" > "$RUNNER_TEMP/pi-rogue-pack.json"
          TARBALL="$(node -e 'const fs=require("fs"); const path=require("path"); const rows=JSON.parse(fs.readFileSync(process.argv[1], "utf8")); process.stdout.write(path.resolve(process.argv[2], rows[0].filename));' "$RUNNER_TEMP/pi-rogue-pack.json" "$PACK_DIR")"
          node ../../scripts/smoke-canonical-package.mjs "$TARBALL"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Publish exact smoke-tested canonical artifact
        run: npm publish "${{ steps.candidate.outputs.tarball }}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        run: |
          set -euo pipefail

          PKG="$(node -p "require('./packages/bundle/package.json').name")"
          VERSION="$(node -p "require('./packages/bundle/package.json').version")"
          DEADLINE=$((SECONDS + 300))
          DELAY=5
          MAX_DELAY=60

          mkdir -p "$RUNNER_TEMP/npm-verify-cache"
          echo "Verifying $PKG@$VERSION is visible on npm"

          while (( SECONDS < DEADLINE )); do
            SEEN="$(npm view "$PKG@$VERSION" version --registry=https://registry.npmjs.org/ --prefer-online --cache="$RUNNER_TEMP/npm-verify-cache" 2>/dev/null || true)"
            if [[ "$SEEN" == "$VERSION" ]]; then
              echo "Published $VERSION verified"
              exit 0
            fi

            REMAINING=$((DEADLINE - SECONDS))
            SLEEP_FOR=$(( DELAY < REMAINING ? DELAY : REMAINING ))
            echo "Not visible yet; retrying in ${SLEEP_FOR}s..."
            sleep "$SLEEP_FOR"
            DELAY=$(( DELAY * 2 ))
            if (( DELAY > MAX_DELAY )); then
              DELAY=$MAX_DELAY
            fi
          done

          echo "Timed out waiting for $PKG@$VERSION to appear on npm"
          exit 1

      - name: Fresh-cache registry install and Pi-host smoke
        run: |
          PKG="$(node -p "require('./packages/bundle/package.json').name")"
          VERSION="$(node -p "require('./packages/bundle/package.json').version")"
          node scripts/smoke-canonical-package.mjs "$PKG@$VERSION"

      - name: Deprecate and verify legacy packages
        run: node scripts/deprecate-legacy-packages.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}