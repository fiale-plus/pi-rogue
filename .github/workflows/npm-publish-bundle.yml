name: Publish Pi-Rogue to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'pi-rogue-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Run checks
        run: |
          npm run check
          npm test

      - name: Sync canonical package version from release tag
        working-directory: packages/bundle
        run: |
          RAW_TAG="${GITHUB_REF_NAME#pi-rogue-}"
          VERSION="${RAW_TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Synced packages/bundle/package.json to $VERSION"

      - name: Vendor bundled package sources for single-artefact release (leaf releases paused)
        working-directory: packages/bundle
        run: |
          mkdir -p node_modules/@fiale-plus
          cp -a ../../packages/core node_modules/@fiale-plus/pi-core
          cp -a ../../packages/advisor node_modules/@fiale-plus/pi-rogue-advisor
          cp -a ../../packages/context-broker node_modules/@fiale-plus/pi-rogue-context-broker
          cp -a ../../packages/orchestration node_modules/@fiale-plus/pi-rogue-orchestration
          cp -a ../../packages/router node_modules/@fiale-plus/pi-rogue-router
          echo "Vendored local (git-at-tag) core, advisor, context-broker, orchestration, and router into bundle for bundling as single artefact"

      - name: Publish canonical package
        working-directory: packages/bundle
        run: npm publish . --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        run: |
          set -euo pipefail

          PKG="$(node -p "require('./packages/bundle/package.json').name")"
          VERSION="$(node -p "require('./packages/bundle/package.json').version")"
          DEADLINE=$((SECONDS + 300))
          DELAY=5
          MAX_DELAY=60

          mkdir -p "$RUNNER_TEMP/npm-verify-cache"
          echo "Verifying $PKG@$VERSION is visible on npm"

          while (( SECONDS < DEADLINE )); do
            SEEN="$(npm view "$PKG@$VERSION" version --registry=https://registry.npmjs.org/ --prefer-online --cache="$RUNNER_TEMP/npm-verify-cache" 2>/dev/null || true)"
            if [[ "$SEEN" == "$VERSION" ]]; then
              echo "Published $VERSION verified"
              exit 0
            fi

            REMAINING=$((DEADLINE - SECONDS))
            SLEEP_FOR=$(( DELAY < REMAINING ? DELAY : REMAINING ))
            echo "Not visible yet; retrying in ${SLEEP_FOR}s..."
            sleep "$SLEEP_FOR"
            DELAY=$(( DELAY * 2 ))
            if (( DELAY > MAX_DELAY )); then
              DELAY=$MAX_DELAY
            fi
          done

          echo "Timed out waiting for $PKG@$VERSION to appear on npm"
          exit 1

      - name: Deprecate legacy packages
        run: |
          set -e

          deprecate_with_retry() {
            local pkg="$1"
            local msg="$2"
            if ! npm deprecate "$pkg" "$msg"; then
              echo "Warning: npm deprecate failed for ${pkg} (continuing)"
              return 0
            fi
          }

          deprecate_with_retry "@fiale-plus/pi-rogue-bundle@*" "Deprecated: replaced by @fiale-plus/pi-rogue. Install with \"pi install npm:@fiale-plus/pi-rogue\"."
          deprecate_with_retry "@fiale-plus/pi-rogue-advisor@*" "Deprecated: advisor/orchestration are bundled in @fiale-plus/pi-rogue. Use that package."
          deprecate_with_retry "@fiale-plus/pi-rogue-orchestration@*" "Deprecated: advisor/orchestration are bundled in @fiale-plus/pi-rogue. Use that package."
          deprecate_with_retry "@fiale-plus/pi-orchestration@*" "Deprecated: replaced by @fiale-plus/pi-rogue. Install via \"pi install npm:@fiale-plus/pi-rogue\"."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}