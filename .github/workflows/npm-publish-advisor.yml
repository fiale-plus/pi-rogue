name: Publish Advisor to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Run checks
        run: |
          npm run check
          npm test

      - name: Sync advisor package version from release tag
        working-directory: packages/advisor
        run: |
          RAW_TAG="${GITHUB_REF_NAME#advisor-}"
          VERSION="${RAW_TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Synced packages/advisor/package.json to $VERSION"

      - name: Publish advisor package
        run: npm publish ./packages/advisor --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./packages/advisor/package.json').version")"
          PKG="@fiale-plus/pi-rogue-advisor"
          npm view "$PKG@$VERSION" version
