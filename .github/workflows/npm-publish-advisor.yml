name: Publish Advisor to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'advisor-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Run checks
        run: |
          npm run check
          npm test

      - name: Sync advisor package version from release tag
        working-directory: packages/advisor
        run: |
          RAW_TAG="${GITHUB_REF_NAME#advisor-}"
          VERSION="${RAW_TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Synced packages/advisor/package.json to $VERSION"

      - name: Publish advisor package
        run: npm publish ./packages/advisor --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        run: |
          set -euo pipefail

          PKG="$(node -p "require('./packages/advisor/package.json').name")"
          VERSION="$(node -p "require('./packages/advisor/package.json').version")"
          DEADLINE=$((SECONDS + 300))
          DELAY=5
          MAX_DELAY=60

          mkdir -p "$RUNNER_TEMP/npm-verify-cache"
          echo "Verifying $PKG@$VERSION is visible on npm"

          while (( SECONDS < DEADLINE )); do
            SEEN="$(npm view "$PKG@$VERSION" version --registry=https://registry.npmjs.org/ --prefer-online --cache="$RUNNER_TEMP/npm-verify-cache" 2>/dev/null || true)"
            if [[ "$SEEN" == "$VERSION" ]]; then
              echo "Published $VERSION verified"
              exit 0
            fi

            REMAINING=$((DEADLINE - SECONDS))
            SLEEP_FOR=$(( DELAY < REMAINING ? DELAY : REMAINING ))
            echo "Not visible yet; retrying in ${SLEEP_FOR}s..."
            sleep "$SLEEP_FOR"
            DELAY=$(( DELAY * 2 ))
            if (( DELAY > MAX_DELAY )); then
              DELAY=$MAX_DELAY
            fi
          done

          echo "Timed out waiting for $PKG@$VERSION to appear on npm"
          exit 1
